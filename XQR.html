<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X QR · quad generator mewah</title>
  <!-- Font & Library -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      font-family: 'Inter', 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image: radial-gradient(circle at 20% 30%, rgba(160,160,160,0.12) 0%, transparent 40%),
                        radial-gradient(circle at 90% 70%, rgba(200,200,200,0.08) 0%, transparent 50%);
    }

    .container {
      max-width: 1300px;
      width: 100%;
    }

    /* header X QR */
    .title-block {
      text-align: center;
      margin-bottom: 2rem;
    }
    .title-block h1 {
      font-size: 5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #c2c2c2, #5e5e5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(255,255,255,0.2);
      letter-spacing: 4px;
    }
    .title-block .sub {
      color: #9e9e9e;
      font-weight: 300;
      text-transform: uppercase;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    /* panel liquid glass utama */
    .glass-panel {
      background: rgba(25, 25, 25, 0.5);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 50px -25px black, inset 0 1px 2px rgba(255,255,255,0.1);
      padding: 2rem 2rem 2.5rem;
      margin-bottom: 2.5rem;
    }

    /* pengaturan global (tema, warna, logo) */
    .global-settings {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2rem 2.5rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .theme-section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .theme-label {
      font-size: 0.8rem;
      color: #b0b0b0;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-left: 0.5rem;
    }
    .theme-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }
    .theme-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
      box-shadow: 0 8px 14px -6px black;
    }
    .theme-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 18px rgba(220,220,220,0.3);
    }
    .color-pickers {
      display: flex;
      gap: 1.5rem;
      background: rgba(0,0,0,0.3);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .color-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .color-item span {
      color: #bbb;
      font-size: 0.85rem;
    }
    input[type="color"] {
      width: 48px;
      height: 40px;
      border: 1px solid #555;
      border-radius: 40px;
      background: transparent;
      padding: 3px;
      cursor: pointer;
    }
    .logo-upload {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .file-label {
      background: rgba(60,60,60,0.5);
      border-radius: 60px;
      padding: 0.7rem 1.8rem;
      border: 1px dashed #7a7a7a;
      color: #ccc;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .file-label:hover {
      background: rgba(90,90,90,0.6);
    }
    #logoUpload { display: none; }
    .file-name {
      color: #a0a0a0;
      font-size: 0.9rem;
    }

    /* grid 4 kotak */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.8rem;
    }
    @media (max-width: 800px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
    }
    .qr-card {
      background: rgba(18, 18, 18, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 38px;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 1.8rem 1.5rem 1.5rem;
      box-shadow: 0 20px 30px -15px black;
      transition: transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }
    .qr-card:hover {
      border-color: rgba(180,180,180,0.2);
      transform: translateY(-3px);
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 400;
      color: #e0e0e0;
      margin-bottom: 1rem;
      letter-spacing: 1px;
      border-left: 4px solid #8a8a8a;
      padding-left: 0.8rem;
    }
    .card-input {
      background: rgba(10,10,10,0.8);
      border: 1px solid #3a3a3a;
      border-radius: 34px;
      padding: 0.9rem 1.5rem;
      color: white;
      font-size: 0.95rem;
      margin-bottom: 1.3rem;
      outline: none;
      transition: 0.2s;
      width: 100%;
    }
    .card-input:focus {
      border-color: #8a8a8a;
      box-shadow: 0 0 0 3px rgba(200,200,200,0.2);
    }
    textarea.card-input {
      border-radius: 28px;
      resize: vertical;
      min-height: 80px;
    }
    .qr-canvas-wrapper {
      display: flex;
      justify-content: center;
      margin: 1rem 0 1.2rem;
      background: rgba(0,0,0,0.4);
      border-radius: 30px;
      padding: 1.2rem;
    }
    canvas.qr-canvas {
      width: 180px;
      height: 180px;
      border-radius: 24px;
      box-shadow: 0 15px 25px -10px black, 0 0 0 1px rgba(255,255,255,0.08);
      background: #1a1a1a;
    }
    .card-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
      justify-content: center;
    }
    .btn-sm {
      background: rgba(40,40,40,0.8);
      border: 1px solid #4f4f4f;
      color: #ddd;
      border-radius: 50px;
      padding: 0.5rem 1.3rem;
      font-size: 0.8rem;
      font-weight: 300;
      cursor: pointer;
      transition: 0.15s;
      backdrop-filter: blur(4px);
      box-shadow: 0 5px 10px -5px black;
    }
    .btn-sm:hover {
      background: #4a4a4a;
      border-color: #8f8f8f;
      color: white;
    }
    .btn-generate-card {
      background: linear-gradient(145deg, #2c2c2c, #1f1f1f);
      border: 1px solid #5e5e5e;
      color: white;
      border-radius: 50px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      margin-top: 0.2rem;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-generate-card:hover {
      background: #3f3f3f;
      border-color: #9b9b9b;
    }
    .footer {
      text-align: center;
      color: #6d6d6d;
      font-weight: 300;
      font-size: 0.9rem;
      margin-top: 3.5rem;
      padding-top: 1.8rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER X QR -->
    <div class="title-block">
      <h1>X QR</h1>
      <div class="sub">liquid glass · quad edition</div>
    </div>

    <!-- PANEL KACA: PENGATURAN GLOBAL (tema, warna, logo) -->
    <div class="glass-panel">
      <div class="global-settings">
        <!-- 7 tema -->
        <div class="theme-section">
          <div class="theme-label">🎨 7 tema mewah</div>
          <div class="theme-buttons" id="themeGrid"></div>
        </div>
        <!-- color picker bebas -->
        <div class="color-pickers">
          <div class="color-item"><span>QR</span><input type="color" id="fgColor" value="#000000"></div>
          <div class="color-item"><span>BG</span><input type="color" id="bgColor" value="#ffffff"></div>
        </div>
        <!-- upload logo bulat -->
        <div class="logo-upload">
          <label for="logoUpload" class="file-label" id="fileLabel">Pilih logo bulat</label>
          <input type="file" id="logoUpload" accept="image/*">
          <span class="file-name" id="fileName">tidak ada logo</span>
        </div>
      </div>

      <!-- 4 KOTAK (CARD) UNTUK LINK, GAMBAR, VIDEO, TEKS -->
      <div class="card-grid" id="cardGrid">
        <!-- CARD 1: LINK -->
        <div class="qr-card" data-id="link">
          <div class="card-title">🔗 LINK → QR</div>
          <input type="url" id="inputLink" class="card-input" placeholder="https://contoh.com" value="https://example.com">
          <div class="qr-canvas-wrapper">
            <canvas id="qrLink" class="qr-canvas" width="200" height="200"></canvas>
          </div>
          <button class="btn-generate-card" data-generate="link">Generate QR</button>
          <div class="card-actions">
            <button class="btn-sm" data-copy="link">📋 Salin Teks</button>
            <button class="btn-sm" data-download="link">⬇️ Simpan QR</button>
          </div>
        </div>

        <!-- CARD 2: GAMBAR (URL Gambar) -->
        <div class="qr-card" data-id="image">
          <div class="card-title">🖼️ GAMBAR → QR (URL)</div>
          <input type="url" id="inputImage" class="card-input" placeholder="https://.../gambar.jpg" value="https://picsum.photos/200/300">
          <div class="qr-canvas-wrapper">
            <canvas id="qrImage" class="qr-canvas" width="200" height="200"></canvas>
          </div>
          <button class="btn-generate-card" data-generate="image">Generate QR</button>
          <div class="card-actions">
            <button class="btn-sm" data-copy="image">📋 Salin Teks</button>
            <button class="btn-sm" data-download="image">⬇️ Simpan QR</button>
          </div>
        </div>

        <!-- CARD 3: VIDEO (URL Video) -->
        <div class="qr-card" data-id="video">
          <div class="card-title">🎬 VIDEO → QR (URL)</div>
          <input type="url" id="inputVideo" class="card-input" placeholder="https://youtu.be/..." value="https://youtu.be/dQw4w9WgXcQ">
          <div class="qr-canvas-wrapper">
            <canvas id="qrVideo" class="qr-canvas" width="200" height="200"></canvas>
          </div>
          <button class="btn-generate-card" data-generate="video">Generate QR</button>
          <div class="card-actions">
            <button class="btn-sm" data-copy="video">📋 Salin Teks</button>
            <button class="btn-sm" data-download="video">⬇️ Simpan QR</button>
          </div>
        </div>

        <!-- CARD 4: TEKS BEBAS -->
        <div class="qr-card" data-id="text">
          <div class="card-title">📝 TEKS → QR</div>
          <textarea id="inputText" class="card-input" rows="2" placeholder="Tulis teks apa saja...">Halo dunia! X QR</textarea>
          <div class="qr-canvas-wrapper">
            <canvas id="qrText" class="qr-canvas" width="200" height="200"></canvas>
          </div>
          <button class="btn-generate-card" data-generate="text">Generate QR</button>
          <div class="card-actions">
            <button class="btn-sm" data-copy="text">📋 Salin Teks</button>
            <button class="btn-sm" data-download="text">⬇️ Simpan QR</button>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">Desighn by : Deshbanaaa | 2026</div>
  </div>

  <script>
    (function() {
      // ====================== 7 TEMA MEWAH ======================
      const themes = [
        { name: 'Onyx', fg: '#1e1e1e', bg: '#ececec' },
        { name: 'Golden', fg: '#CFAF7E', bg: '#1a1a1a' },
        { name: 'Sapphire', fg: '#4f7da8', bg: '#151515' },
        { name: 'Emerald', fg: '#5f8b6f', bg: '#151515' },
        { name: 'Garnet', fg: '#a65353', bg: '#1c1c1c' },
        { name: 'Amethyst', fg: '#8b6fa3', bg: '#1b1b1b' },
        { name: 'Cyan', fg: '#5b9b9b', bg: '#121212' }
      ];

      const themeGrid = document.getElementById('themeGrid');
      themes.forEach(t => {
        const btn = document.createElement('div');
        btn.className = 'theme-btn';
        btn.style.backgroundColor = t.bg;
        btn.style.border = `3px solid ${t.fg}`;
        btn.setAttribute('data-fg', t.fg);
        btn.setAttribute('data-bg', t.bg);
        btn.title = t.name;
        btn.addEventListener('click', function() {
          document.getElementById('fgColor').value = t.fg;
          document.getElementById('bgColor').value = t.bg;
        });
        themeGrid.appendChild(btn);
      });

      // ====================== UPLOAD LOGO ======================
      const logoInput = document.getElementById('logoUpload');
      const fileNameSpan = document.getElementById('fileName');
      let logoImage = null; // untuk menyimpan objek Image setelah upload

      logoInput.addEventListener('change', function(e) {
        const file = this.files[0];
        if (file) {
          fileNameSpan.textContent = file.name;
          const reader = new FileReader();
          reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
              logoImage = img; // simpan gambar yang sudah dimuat
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        } else {
          fileNameSpan.textContent = 'tidak ada logo';
          logoImage = null;
        }
      });

      // ====================== FUNGSI GENERATE QR (DENGAN LOGO) ======================
      function drawQRMatrixOnCanvas(canvas, text, fg, bg, logoImg) {
        if (!text) text = ' ';
        const qr = qrcode(0, 'H'); // High error correction untuk logo
        qr.addData(text);
        qr.make();

        const moduleCount = qr.getModuleCount();
        const cellSize = 5; // 5px per module
        const size = moduleCount * cellSize;
        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext('2d');
        // background
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, size, size);
        // modul QR
        ctx.fillStyle = fg;
        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
              ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
            }
          }
        }

        // jika ada logo, gambar di tengah dengan clip bulat
        if (logoImg) {
          const maxLogoSize = size * 0.23; // 23% dari QR
          let w = logoImg.width;
          let h = logoImg.height;
          const scale = Math.min(maxLogoSize / w, maxLogoSize / h);
          w *= scale;
          h *= scale;
          const x = (size - w) / 2;
          const y = (size - h) / 2;

          ctx.save();
          ctx.beginPath();
          ctx.arc(size/2, size/2, Math.min(w, h)/2, 0, 2*Math.PI);
          ctx.clip();
          ctx.drawImage(logoImg, x, y, w, h);
          ctx.restore();

          // lingkaran border tipis
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(size/2, size/2, Math.min(w, h)/2 + 1, 0, 2*Math.PI);
          ctx.stroke();
          ctx.restore();
        }
      }

      // helper untuk mendapatkan canvas berdasarkan id card
      function getCanvasId(cardId) {
        switch(cardId) {
          case 'link': return 'qrLink';
          case 'image': return 'qrImage';
          case 'video': return 'qrVideo';
          case 'text': return 'qrText';
          default: return null;
        }
      }

      function getInputValue(cardId) {
        switch(cardId) {
          case 'link': return document.getElementById('inputLink').value;
          case 'image': return document.getElementById('inputImage').value;
          case 'video': return document.getElementById('inputVideo').value;
          case 'text': return document.getElementById('inputText').value;
          default: return '';
        }
      }

      // fungsi generate spesifik untuk satu card
      function generateCardQR(cardId) {
        const canvasId = getCanvasId(cardId);
        if (!canvasId) return;
        const canvas = document.getElementById(canvasId);
        const text = getInputValue(cardId) || ' ';
        const fg = document.getElementById('fgColor').value;
        const bg = document.getElementById('bgColor').value;

        // Jika logoImage ada dan sudah selesai dimuat, gunakan; jika tidak, null
        if (logoImage && logoImage.complete && logoImage.naturalHeight !== 0) {
          drawQRMatrixOnCanvas(canvas, text, fg, bg, logoImage);
        } else {
          drawQRMatrixOnCanvas(canvas, text, fg, bg, null);
        }
      }

      // ====================== EVENT LISTENER UNTUK SEMUA CARD ======================
      document.querySelectorAll('.btn-generate-card').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const card = this.closest('.qr-card');
          const cardId = card.getAttribute('data-id');
          generateCardQR(cardId);
        });
      });

      // tombol copy teks
      document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', function() {
          const cardId = this.getAttribute('data-copy');
          const text = getInputValue(cardId);
          navigator.clipboard.writeText(text).then(() => {
            alert('Teks disalin!');
          }).catch(() => alert('Gagal menyalin'));
        });
      });

      // tombol download QR (simpan canvas)
      document.querySelectorAll('[data-download]').forEach(btn => {
        btn.addEventListener('click', function() {
          const cardId = this.getAttribute('data-download');
          const canvasId = getCanvasId(cardId);
          const canvas = document.getElementById(canvasId);
          const link = document.createElement('a');
          link.download = `XQR_${cardId}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        });
      });

      // ====================== GENERATE AWAL ======================
      // generate semua card saat halaman dimuat (default)
      window.addEventListener('load', function() {
        // set tema pertama (onyx) ke color picker
        document.getElementById('fgColor').value = themes[0].fg;
        document.getElementById('bgColor').value = themes[0].bg;

        // generate keempat card
        generateCardQR('link');
        generateCardQR('image');
        generateCardQR('video');
        generateCardQR('text');
      });

      // opsional: jika user mengganti warna/logo, tidak otomatis generate. biarkan manual.
      // namun bisa ditambahkan tombol "generate semua" jika diinginkan, tapi tidak diminta.
      // kita sudah memiliki masing-masing tombol generate.

    })();
  </script>
</body>
</html>
